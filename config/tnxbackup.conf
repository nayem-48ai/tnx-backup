# =====================================================
#  TNx Backup - Main Configuration File
#  Edit values below. Lines starting with # are comments.
# =====================================================

# --- Local source ---
SOURCE_ROOT="/sdcard"

# --- Remotes (rclone remote names). First is default/primary. ---
# Add more separated by spaces for multi-remote fallback, e.g. "mega1 mega2"
REMOTES="mega"

# --- Base folder created inside each remote ---
REMOTE_BASE="TNxBackup"

# --- Default backup mode: mirror | zip ---
DEFAULT_MODE="mirror"

# --- Default profile to use (see config/profiles/) ---
DEFAULT_PROFILE="full"

# --- Retention: keep this many newest backups per remote (0 = keep all) ---
RETENTION_KEEP="5"
# Retention by age in days (0 = disabled). If >0, deletes backups older than N days.
RETENTION_DAYS="0"

# --- Battery / Wi-Fi guard ---
GUARD_ENABLE="true"
GUARD_MIN_BATTERY="20"      # minimum battery % to allow backup
GUARD_REQUIRE_WIFI="true"   # true = only run on Wi-Fi (not mobile data)

# --- Transfer tuning ---
RCLONE_TRANSFERS="4"
RCLONE_CHECKERS="8"
RCLONE_EXTRA_FLAGS="--fast-list"

# --- Compression program for zip mode: pigz | gzip ---
ZIP_COMPRESSOR="pigz"
